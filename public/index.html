<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Pro Generator | World Class V3</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>
    <div class="container">
        <header class="app-header">
            <div class="brand-icon">
                <i class="ph-bold ph-truck"></i>
            </div>
            <h1 class="app-title">Generador de Órdenes</h1>
            <p class="app-subtitle">Planner Pro World Class Edition</p>
        </header>

        <main class="main-card">
            <form id="generateForm">
                <div class="form-grid">
                    <!-- Section: General -->
                    <div class="form-group">
                        <label class="form-label" for="cantidad_ordenes">Cantidad de Órdenes <span
                                style="color:red">*</span></label>
                        <input type="number" id="cantidad_ordenes" name="cantidad_ordenes" class="form-input" value="40"
                            min="1" max="1000" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="ct_origen">CT Origen <span style="color:red">*</span></label>
                        <input type="text" id="ct_origen" name="ct_origen" class="form-input" placeholder="Ej: CD Norte"
                            required>
                        <span class="form-hint">Obligatorio</span>
                    </div>

                    <!-- Cascading Dropdowns -->
                    <div class="form-group">
                        <label class="form-label" for="pais">País</label>
                        <div style="position: relative;">
                            <i class="ph ph-globe"
                                style="position: absolute; left: 12px; top: 12px; color: var(--slate-400);"></i>
                            <select id="pais" name="pais" class="form-input" style="padding-left: 2.5rem;">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <input type="text" id="pais_otro" name="pais_otro" class="form-input"
                            style="margin-top: 0.5rem; display: none;" placeholder="Especifique País">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="ciudad">Ciudad</label>
                        <div style="position: relative;">
                            <i class="ph ph-map-pin"
                                style="position: absolute; left: 12px; top: 12px; color: var(--slate-400);"></i>
                            <select id="ciudad" name="ciudad" class="form-input" style="padding-left: 2.5rem;">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <input type="text" id="ciudad_otro" name="ciudad_otro" class="form-input"
                            style="margin-top: 0.5rem; display: none;" placeholder="Especifique Ciudad">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="fecha_entrega">Fecha de Entrega <span
                                style="color:red">*</span></label>
                        <input type="date" id="fecha_entrega" name="fecha_entrega" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <!-- Items is now Optional -->
                        <label class="form-label" for="items_por_orden">Ítems por Orden (Opcional)</label>
                        <input type="number" id="items_por_orden" name="items_por_orden" class="form-input" value="1"
                            min="1" max="10" placeholder="1">
                    </div>

                    <!-- Section: Ventana 1 (Required) with Flatpickr -->
                    <div class="form-group">
                        <label class="form-label" for="ventana_inicio">Ventana 1 Inicio <span
                                style="color:red">*</span></label>
                        <input type="text" id="ventana_inicio" name="ventana_inicio" class="form-input time-picker"
                            value="09:00" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="ventana_fin">Ventana 1 Fin <span
                                style="color:red">*</span></label>
                        <input type="text" id="ventana_fin" name="ventana_fin" class="form-input time-picker"
                            value="18:00" required>
                    </div>

                    <!-- Section: Capacidad (Required Range) -->
                    <div class="form-group">
                        <label class="form-label" for="capacidad_min">Capacidad Mínima <span
                                style="color:red">*</span></label>
                        <input type="number" id="capacidad_min" name="capacidad_min" class="form-input" value="0.001"
                            min="0" step="0.0001" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="capacidad_max">Capacidad Máxima <span
                                style="color:red">*</span></label>
                        <input type="number" id="capacidad_max" name="capacidad_max" class="form-input" value="0.05"
                            min="0" step="0.0001" required>
                    </div>
                </div>

                <!-- Advanced Options -->
                <details
                    style="margin-top: 2rem; background: var(--slate-50); padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--slate-200);">
                    <summary style="cursor: pointer; font-weight: 600; color: var(--primary-600);">Opciones Avanzadas
                        (Opcional)</summary>
                    <div class="form-grid" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label class="form-label" for="ventana2_inicio">Ventana 2 Inicio</label>
                            <input type="text" id="ventana2_inicio" name="ventana2_inicio"
                                class="form-input time-picker">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="ventana2_fin">Ventana 2 Fin</label>
                            <input type="text" id="ventana2_fin" name="ventana2_fin" class="form-input time-picker">
                        </div>

                        <!-- Capacity 2 (Optional) -->
                        <div class="form-group">
                            <label class="form-label" for="capacidad2_min">Capacidad 2 Mínima</label>
                            <input type="number" id="capacidad2_min" name="capacidad2_min" class="form-input" min="0"
                                step="0.0001">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="capacidad2_max">Capacidad 2 Máxima</label>
                            <input type="number" id="capacidad2_max" name="capacidad2_max" class="form-input" min="0"
                                step="0.0001">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="service_time">Service Time (min)</label>
                            <input type="number" id="service_time" name="service_time" class="form-input"
                                placeholder="Ej: 15">
                        </div>
                    </div>
                </details>

                <!-- Dynamic Tags Section -->
                <div style="margin-top: 2rem; border-top: 1px solid var(--slate-200); padding-top: 1.5rem;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="font-size: 1.1rem; font-weight: 600; color: var(--slate-800);">Tags Dinámicos</h3>
                        <button type="button" id="addTagBtn" class="btn-secondary"
                            style="font-size: 0.9rem; padding: 0.5rem 1rem;">
                            <i class="ph-bold ph-plus"></i> Añadir Tag
                        </button>
                    </div>
                    <div id="tagsContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Tags will be injected here -->
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary" style="margin-top: 2rem;">
                    <span id="btnText">Generar y Descargar .xlsx</span>
                    <i class="ph-bold ph-download-simple"></i>
                </button>
            </form>

            <!-- Template for Tag Item (Hidden) -->
            <template id="tagTemplate">
                <div class="tag-card"
                    style="background: white; border: 1px solid var(--slate-200); border-radius: var(--radius-md); padding: 1rem; position: relative;">
                    <button type="button" class="remove-tag-btn"
                        style="position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--slate-400); cursor: pointer;">
                        <i class="ph-bold ph-x"></i>
                    </button>
                    <div class="form-group">
                        <label class="form-label">Nombre de Categoría (Header)</label>
                        <input type="text" class="form-input tag-header" placeholder="EJ: TIPO_VEHICULO" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" style="display: flex; justify-content: space-between;">
                            Valores Posibles <small style="color: var(--slate-500);">(Se elegirá uno al azar)</small>
                        </label>
                        <div class="tag-values-container" style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <!-- Values injected here -->
                            <div style="display: flex; gap: 0.5rem;">
                                <input type="text" class="form-input tag-value" placeholder="Valor 1" required>
                            </div>
                        </div>
                        <button type="button" class="btn-secondary add-value-btn"
                            style="margin-top: 0.5rem; width: 100%; justify-content: center; font-size: 0.8rem;">
                            <i class="ph-bold ph-plus"></i> Agregar Valor
                        </button>
                    </div>
                </div>
            </template>
        </main>

        <footer class="app-footer">
            <p>&copy; 2025 Planner Pro Generator V3. Powered by Antigravity.</p>
        </footer>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="script.js"></script>
</body>

</html>
